<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREINAMENTO HARDCORE</title>
</head>
<body>
    <h1><center>SELEÇÃO BRASILEIRA DE MOBA</center></h1>
    <h2><center>Bem vindo ao nosso Treinamento!</center></h2>
    <p>Pressione as teclas do jogo (Q, W, E, R, D, F ou 1-7) para treinar.</p>
    <br>
    <h3 id="texto">Ação realizada: Nenhuma</p>
    <script>
        window.addEventListener('keydown', function(event) {
            var x = event.key.toUpperCase();
            var acao = "";
            if ('QWER'.includes(x)){
                acao = "Habilidade do " + x
            } else if ('DF'.includes(x)){
                acao = "Feitiço de Invocador do " + x 
            } else if ('1234567'.includes(x)){
                acao = "Atalho para o Item " + x
            } else {
                acao = "Tecla inválida para o treinamento!"
            }
            document.getElementById("texto").innerHTML = "Ação realizada: " + acao;
        });
    </script>
</body>
</html>
